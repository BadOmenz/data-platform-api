version: "3.9"

services:
  db:
    image: postgres:15
    container_name: data_platform_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: data_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: data_platform_api
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_NAME: data_platform
      DB_USER: postgres
      DB_PASSWORD: postgres
    volumes:
      - ./backend:/app

volumes:
  postgres_data: